        <div id="modal-content-box" class="modal-content w-full max-w-sm bg-slate-900/90 backdrop-blur-md rounded-2xl text-center p-6 relative transform scale-95" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-3 right-3 text-gray-400 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <div id="contact-options-view" class="hidden">
                 <h3 class="text-xl font-bold text-white mb-4">Contact via</h3>
                 <div class="flex items-center justify-center space-x-6">

                    </a>
                    <a href="https://m.me/duynguyen2797" target="_blank" rel="noopener noreferrer" class="transition transform hover:scale-110">

    <script>
        const modal = document.getElementById('product-modal');
        const modalContentBox = document.getElementById('modal-content-box');
        const productDetailsView = document.getElementById('product-details-view');
        const contactOptionsView = document.getElementById('contact-options-view');

        const productTemplates = {
            chatgpt: `
                <img src="https://i.postimg.cc/xd11g0Mp/ChatGPT.png" alt="ChatGPT Logo" class="h-12 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">ChatGPT Plus & Team</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#74aa9c] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            notion: `
                <img src="https://i.postimg.cc/VLw1Dfc9/Notion.png" alt="Notion Logo" class="h-12 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">Notion Edu Plus</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-gray-100 text-black font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            gg1: `
                <img src="https://i.postimg.cc/PrdNVsGD/2-TB-1-year-GG1.png" alt="GG1 Logo" class="h-12 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">Google One 2TB</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#4285F4] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            canva: `
                <img src="https://i.postimg.cc/YSdwSY4b/Canva.png" alt="Canva Logo" class="h-12 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">Canva Pro & Edu</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#00C4CC] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            perplexity: `
                <img src="https://i.postimg.cc/sDfHjxdg/Perplexity-AI-1.png" alt="Perplexity AI Logo" class="h-12 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">Perplexity Pro</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#20B2AA] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
             m365: `
                 <img src="https://i.postimg.cc/T1wFDksp/M365-x-One-Drive.png" alt="M365 Logo" class="h-14 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">Microsoft 365 & OneDrive</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#D83B01] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            zoom: `
                <img src="https://i.postimg.cc/qRZ01y4z/Zoom.png" alt="Zoom Logo" class="h-12 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">Zoom Pro</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#2D8CFF] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            spotify: `
                 <img src="https://i.postimg.cc/V6c43LW1/Spotify.png" alt="Spotify Logo" class="h-14 mx-auto mb-3 object-contain">
                 <h3 class="text-lg font-bold text-white mb-4">Spotify Premium</h3>
                 <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#1DB954] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            youtube: `
                <img src="https://i.postimg.cc/sXDGBkV7/YouTube.webp" alt="YouTube Logo" class="h-14 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">YouTube Premium</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#FF0000] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            beautifulai: `
                <img src="https://i.postimg.cc/63H1sxjQ/beautiful-ai.png" alt="beautiful.ai Logo" class="h-14 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">Beautiful.ai Pro</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#003B4D] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            gamma: `
                <img src="https://i.postimg.cc/wMC2Hqh9/Gamma.png" alt="Gamma App" class="h-14 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">Gamma Pro</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#8B5CF6] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            claude: `
                <img src="https://i.postimg.cc/rpkSpt60/Claude.webp" alt="Claude Logo" class="h-12 mx-auto mb-3 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">Claude Pro & Max</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-[#D97706] text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `,
            ggstorage: `
                <img src="https://i.postimg.cc/65xbDczn/Google-storage.png" alt="GG 1 Storage Logo" class="h-14 mx-auto mb-4 object-contain">
                <h3 class="text-lg font-bold text-white mb-4">Google Storage</h3>
                <button onclick="showContactOptions()" class="w-full py-2.5 bg-gradient-to-r from-blue-500 via-red-500 via-yellow-400 to-green-500 text-white font-bold rounded-xl btn-hover transition duration-300">Contact me</button>
            `
        };

        function showModal(contentId) {
            if (productTemplates[contentId]) {
                productDetailsView.innerHTML = productTemplates[contentId];
            }
            productDetailsView.classList.remove('hidden');
            contactOptionsView.classList.add('hidden');
            modal.classList.remove('invisible', 'opacity-0');
            modal.querySelector('.modal-content').classList.remove('scale-95');
        }

        function showContactOptions() {
            productDetailsView.classList.add('hidden');
            contactOptionsView.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modal.querySelector('.modal-content').classList.add('scale-95');
            setTimeout(() => { modal.classList.add('invisible'); }, 300);
        }

        document.getElementById('mobile-menu-button').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
